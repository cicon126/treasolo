<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-container">
                <h1 class="title">2048</h1>
                <p class="subtitle">合并数字，挑战2048！</p>
            </div>
            <div class="scores-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="new-game">新游戏</button>
            <button class="btn" id="undo">撤回</button>
        </div>

        <div class="game-container" id="game-container">
            <div class="grid-container" id="grid-container">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="tile-container" id="tile-container"></div>
            <div class="game-overlay" id="game-overlay">
                <div class="overlay-content">
                    <h2 id="overlay-title">游戏结束</h2>
                    <p id="overlay-message">没有可移动的方块了！</p>
                    <button class="btn" id="overlay-btn">再来一局</button>
                </div>
            </div>
        </div>

        <div class="instructions">
            <p><strong>操作说明：</strong></p>
            <p>⌨️ 键盘：使用 ↑ ↓ ← → 方向键移动方块</p>
            <p>📱 触屏：滑动手指移动方块</p>
            <p>🎯 目标：合并相同数字，达到 2048！</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>

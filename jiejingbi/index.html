<html lang="zh-CN">

    <title>接金币游戏</title>

            box-sizing: border-box;

            justify-content: center;

        }

            background: linear-gradient(to bottom, #2d3436, #1e272e);

                        0 0 40px rgba(255, 215, 0, 0.1);
            padding: 20px;
            border: 3px solid #ffd700;
            max-width: 90vw;
            max-height: 90vh;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

            display: block;

            height: 100%;
        }

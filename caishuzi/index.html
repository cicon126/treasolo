<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜数字游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .rules {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .input-section {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group {
            flex: 1;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        input[type="text"]:invalid {
            border-color: #e74c3c;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-guess {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-guess:hover {
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-new-game {
            background: #28a745;
            color: white;
        }

        .btn-new-game:hover {
            box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
        }

        .history {
            margin-top: 30px;
        }

        .history h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: #e9ecef;
        }

        .guess-number {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .result {
            display: flex;
            gap: 10px;
        }

        .result span {
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .result .a {
            background: #28a745;
            color: white;
        }

        .result .b {
            background: #ffc107;
            color: #333;
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .attempts {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .attempts span {
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 500px) {
            .game-container {
                padding: 25px;
            }

            .input-section {
                flex-direction: column;
            }

            input[type="text"] {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔢 猜数字游戏</h1>
        <div class="rules">
            <p>规则：猜一个4位不重复的数字</p>
            <p><strong>A</strong> = 数字和位置都正确 | <strong>B</strong> = 数字存在但位置错误</p>
        </div>

        <div class="attempts">
            已尝试：<span id="attempts">0</span> 次
        </div>

        <div id="message" class="message" style="display: none;"></div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="guessInput" maxlength="4" placeholder="输入4位数字" pattern="[0-9]{4}" autocomplete="off">
            </div>
            <button class="btn-guess" id="guessBtn">猜</button>
            <button class="btn-new-game" id="newGameBtn">新游戏</button>
        </div>

        <div class="history">
            <h3>猜题历史</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        let secretNumber = '';
        let attempts = 0;

        function generateSecretNumber() {
            let digits = '0123456789';
            let result = '';
            for (let i = 0; i < 4; i++) {
                const index = Math.floor(Math.random() * digits.length);
                result += digits[index];
                digits = digits.slice(0, index) + digits.slice(index + 1);
            }
            return result;
        }

        function checkGuess(guess) {
            let a = 0;
            let b = 0;
            
            for (let i = 0; i < 4; i++) {
                if (guess[i] === secretNumber[i]) {
                    a++;
                } else if (secretNumber.includes(guess[i])) {
                    b++;
                }
            }
            
            return { a, b };
        }

        function hasDuplicates(str) {
            return new Set(str).size !== str.length;
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
            
            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);
        }

        function addToHistory(guess, result) {
            const historyList = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <span class="guess-number">${guess}</span>
                <div class="result">
                    <span class="a">${result.a}A</span>
                    <span class="b">${result.b}B</span>
                </div>
            `;
            historyList.prepend(item);
        }

        function initGame() {
            secretNumber = generateSecretNumber();
            attempts = 0;
            document.getElementById('attempts').textContent = '0';
            document.getElementById('historyList').innerHTML = '';
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').focus();
            document.getElementById('message').style.display = 'none';
        }

        document.getElementById('guessBtn').addEventListener('click', () => {
            const guess = document.getElementById('guessInput').value.trim();
            
            if (guess.length !== 4) {
                showMessage('请输入4位数字！', 'error');
                return;
            }
            
            if (!/^\d+$/.test(guess)) {
                showMessage('请输入纯数字！', 'error');
                return;
            }
            
            if (hasDuplicates(guess)) {
                showMessage('数字不能重复！', 'error');
                return;
            }
            
            attempts++;
            document.getElementById('attempts').textContent = attempts.toString();
            
            const result = checkGuess(guess);
            addToHistory(guess, result);
            
            if (result.a === 4) {
                showMessage(`🎉 恭喜！你用了 ${attempts} 次猜对了！`, 'success');
                setTimeout(() => {
                    initGame();
                }, 3000);
            }
            
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').focus();
        });

        document.getElementById('newGameBtn').addEventListener('click', initGame);

        document.getElementById('guessInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('guessBtn').click();
            }
        });

        initGame();
    </script>
</body>
</html>
